        '200':
          $ref: '#/components/responses/getBizonylatResponseBody'
    parameters:
      - name: ugyAzonosito
        in: path
        required: true
        description: >-
          Annak az ügynek(bizonylatbeküldés) az egyedi azonosítója, aminek a
          státuszának lekérdezése történik. Path parameterkent letrehozva!
        schema:
          type: string
  /NavM2mBizonylat/bizonylatService/Bizonylat:
    post:
      tags:
        - BizonylatService
      summary: Bizonylat.createBizonylat
      description: >-
        A bizonylat validálását és beküldését biztosító művelet. Visszaadja a
        bizonylat státuszát és a validációs hibákat, amennyiben 30 másodpercen
        belül azok előállnak. A később előálló eredmény getBizonylat művelettel
        az üzgyazonosító megadásával kérdezhető le. (Letrehozva a
        Bizonylat.createBizonylat(messageId*: char, correlationId: char,

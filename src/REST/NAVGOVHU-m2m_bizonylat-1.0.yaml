      summary: Bizonylat.getBizonylat
      description: >-
        A bizonylat lekérdezését biztosító művelet. Visszaadja a bizonylat
        státuszát és a validációs hibákat. (Letrehozva a
        Bizonylat.getBizonylat(messageId*: char, correlationId: char,
        ugyAzonosito: char):GetBizonylatResponseType operation-bol.)
